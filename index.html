<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Naturista Eukrasia</title>
    <style>
        /* ESTILOS GENERALES */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f4f8; 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        /* TARJETA PRINCIPAL */
        .card { 
            background: white; 
            padding: 40px 20px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            max-width: 450px; 
            width: 100%; 
            text-align: center; 
        }

        /* LOGO */
        .logo-box img { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            object-fit: cover; 
            margin-bottom: 15px; 
            border: 4px solid #1ebea5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { color: #2c3e50; margin: 10px 0; font-size: 24px; }
        
        .subt { color: #7f8c8d; font-size: 16px; line-height: 1.5; margin-bottom: 20px; }
        .subt strong { color: #16a085; }

        .separator { height: 3px; background: linear-gradient(to right, transparent, #1ebea5, transparent); margin: 25px auto; width: 60%; }

        /* TABLA DE HORARIOS */
        .tabla-horarios { width: 100%; margin: 20px 0; border-collapse: collapse; font-size: 15px; }
        .tabla-horarios td { padding: 10px; border-bottom: 1px solid #f1f1f1; color: #34495e; }
        .dia { font-weight: bold; text-align: left; }

        /* CONTENEDOR DE VIDEO DE YOUTUBE */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            margin: 25px 0;
            background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* BOTÓN WHATSAPP */
        .whatsapp-btn {
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }
        .whatsapp-btn:hover { 
            transform: translateY(-3px); 
            background-color: #128c7e; 
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.5);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box">
        <img src="logo.jpeg" alt="Logo Clínica Eukrasia">
    </div>

    <h1>Clínica Naturista Eukrasia</h1>
    
    <div class="subt">
        Suplementos de Medicina Natural <br>
        <strong>"Estado de Salud Perfecto"</strong>
    </div>

    <div class="separator"></div>

    <h3>Horarios de Atención</h3>
    <table class="tabla-horarios">
        <tr><td class="dia">Lunes a Viernes</td><td>7:00 AM - 6:00 PM</td></tr>
        <tr><td class="dia">Sábado</td><td>7:00 AM - 12:00 PM</td></tr>
    </table>

    <!-- VIDEO DE LA CLÍNICA (CON EL ID DE TU VIDEO) -->
    <div class="video-wrapper">
       <iframe src="https://www.youtube.com" title="Video Clínica Eukrasia" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>

    </div>

    <!-- BOTÓN DE CONTACTO (CON TU NÚMERO) -->
    <a href="https://wa.me" class="whatsapp-btn">
        Contactar por WhatsApp
    </a>
</div>

</body>
</html>
