<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Web con Imagen y Botón</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        img { width: 300px; border-radius: 10px; margin-bottom: 20px; }
        button { 
            padding: 10px 20px; 
            background-color: #007bff; 
            color: rgb(255, 255, 255); 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>¡Ya funciona!</h1>
    
    <!-- Una imagen de ejemplo desde internet -->
    <img src="https://via.placeholder.com" alt="Imagen de ejemplo">

    <br>

    <!-- Un botón que muestra una alerta al hacer clic -->
    <button onclick="alert('¡Hola! Hiciste clic en el botón')">
        Haz clic aquí
    </button>

</body>  background-color: #282c34; /* Un gris oscuro moderno */
