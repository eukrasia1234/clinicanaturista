

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Naturista Eukrasia</title>
    <style>
        /* Tus estilos existentes mejorados */
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        .logo-box img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #1ebea5; }
        .separator { height: 2px; background-color: #1ebea5; margin: 20px auto; width: 50%; }
        .tabla-horarios { width: 100%; margin: 20px 0; border-collapse: collapse; }
        .tabla-horarios td { padding: 8px; border-bottom: 1px solid #eee; }
        .dia { font-weight: bold; text-align: left; }
        
        /* Contenedor de Video Seguro (YouTube) */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Relación 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            margin-top: 20px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .whatsapp-btn {
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .whatsapp-btn:hover { transform: scale(1.05); background-color: #1ebea5; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box">
        <!-- Asegúrate que la imagen se llame logo.jpeg en tu carpeta -->
        <img src="logo.jpeg" alt="Logo Eukrasia">
    </div>

    <h1>Clínica Naturista Eukrasia</h1>
    
    <div class="subt">
        Suplementos de Medicina Natural <br>
        <strong>"Estado de Salud Perfecto"</strong>
    </div>

    <div class="separator"></div>

    <h3>Horarios de Atención</h3>
    <table class="tabla-horarios">
        <tr><td class="dia">Lunes a Viernes</td><td>7:00 AM - 6:00 PM</td></tr>
        <tr><td class="dia">Sábado</td><td>7:00 AM - 12:00 PM</td></tr>
    </table>

    <!-- SECCIÓN DEL VIDEO (Vía YouTube para que no se bloquee) -->
    <div class="video-container">
        <!-- Reemplaza ID_DEL_VIDEO con el código de tu video de YouTube -->
        <iframe src="https://www.youtube.com" allowfullscreen></iframe>
    </div>

    <a href="https://wa.me" class="whatsapp-btn">
        Contactar por WhatsApp
    </a>
</div>

</body>
</html>
